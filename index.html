<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 Multi-Agent 系统看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 32px; }
    h1 { text-align: center; margin-bottom: 8px; font-size: 28px; color: #f8fafc; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 32px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 16px; padding: 24px; border: 1px solid #334155; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .avatar { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .ceo .avatar { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .laoguanjia .avatar { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
    .dashaoer .avatar { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
    .info h2 { font-size: 18px; color: #f8fafc; }
    .info .type { font-size: 12px; color: #64748b; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
    .status-online { background: #052c16; color: #4ade80; border: 1px solid #166534; }
    .status-offline { background: #2a0a0a; color: #f87171; border: 1px solid #991b1b; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .detail { margin-bottom: 10px; }
    .detail-label { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .detail-value { font-size: 14px; color: #cbd5e1; }
    .relation { margin-top: 16px; padding-top: 16px; border-top: 1px solid #334155; }
    .relation-label { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .relation-value { font-size: 13px; color: #94a3b8; }
    .footer { text-align: center; margin-top: 48px; color: #334155; font-size: 12px; }
    .refresh-btn { display: block; margin: 0 auto 32px; background: #1e40af; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .refresh-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h1>🦞 Multi-Agent 系统看板</h1>
  <p class="subtitle" id="updateTime">加载中...</p>
  <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
  <div class="grid" id="agentGrid">加载中...</div>
  <p class="footer">🦞 CEO 系统 | 数据来源 agents.json</p>

  <script>
    const emojiMap = { 'CEO（贾维斯）': '🦞', '老管家': '🛠️', '大少爷': '🎨' };
    const classMap = { 'CEO（贾维斯）': 'ceo', '老管家': 'laoguanjia', '大少爷': 'dashaoer' };
    const parentMap = { 'CEO（贾维斯）': null, '老管家': 'CEO（贾维斯）', '大少爷': 'CEO（贾维斯）' };

    async function loadData() {
      try {
        const resp = await fetch('agents.json?_=' + Date.now());
        const data = await resp.json();
        render(data.agents, data.lastUpdated);
      } catch (e) {
        document.getElementById('agentGrid').innerHTML = '<p style="color:#f87171;text-align:center;grid-column:1/-1">❌ 数据加载失败，请确认 agents.json 已在正确位置</p>';
      }
    }

    function render(agents, lastUpdated) {
      document.getElementById('updateTime').textContent = '最后更新：' + lastUpdated;
      const grid = document.getElementById('agentGrid');
      grid.innerHTML = agents.map(a => {
        const emoji = emojiMap[a.name] || '🤖';
        const cls = classMap[a.name] || 'ceo';
        const parent = parentMap[a.name];
        const parentName = parent || '（无上级）';
        const statusClass = a.status === '在线' ? 'status-online' : 'status-offline';
        const parentDisplay = parent ? `上级：${parentName}` : '顶级节点';
        return `
          <div class="card ${cls}">
            <div class="card-header">
              <div class="avatar">${emoji}</div>
              <div class="info">
                <h2>${a.name}</h2>
                <div class="type">${a.type}</div>
              </div>
            </div>
            <div class="status-badge ${statusClass}">
              <span class="status-dot"></span>
              ${a.status}
            </div>
            <div class="detail">
              <div class="detail-label">运行设备</div>
              <div class="detail-value">${a.device}</div>
            </div>
            <div class="detail">
              <div class="detail-label">核心职责</div>
              <div class="detail-value">${a.职责}</div>
            </div>
            <div class="detail">
              <div class="detail-label">备注</div>
              <div class="detail-value">${a.备注 || '（无）'}</div>
            </div>
            <div class="relation">
              <div class="relation-label">组织关系</div>
              <div class="relation-value">${parentDisplay}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    loadData();
  </script>
</body>
</html>
